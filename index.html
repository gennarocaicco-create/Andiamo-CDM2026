const toFR = n => TEAM_MAP_LIVE[n] || n;

// Statuts football-data.org → notre format
const isLiveStatus = s => ["IN_PLAY","PAUSED"].includes(s);
const isFinishedStatus = s => ["FINISHED","AWARDED"].includes(s);

// Cache global : on appelle l'API max 1x toutes les 3 min
let _wcMatchesCache = { ts: 0, data: [] };
async function fetchWCMatches() {
  const now = Date.now();
  if (now - _wcMatchesCache.ts < 3*60*1000 && _wcMatchesCache.data.length > 0) {
    return _wcMatchesCache.data;
  }
  try {
    const r = await fetch(`${FOOTBALL_DATA_BASE}/competitions/WC/matches`, {
      headers: { "X-Auth-Token": FOOTBALL_DATA_TOKEN }
    });
    if (!r.ok) return _wcMatchesCache.data;
    const data = await r.json();
    const matches = (data.matches || []).map(m => ({
      home: toFR(m.homeTeam?.name || ""),
      away: toFR(m.awayTeam?.name || ""),
      scoreH: m.score?.fullTime?.home ?? null,
      scoreA: m.score?.fullTime?.away ?? null,
      status: m.status,
      elapsed: m.minute || null,
      isLive: isLiveStatus(m.status),
      isHT: m.status === "PAUSED",
      isET: false,
      isPen: false,
      isFinished: isFinishedStatus(m.status),
      utcDate: m.utcDate
    })).filter(m => m.home && m.away);
    _wcMatchesCache = { ts: now, data: matches };
    return matches;
  } catch(e) { console.log("WC fetch err:", e); return _wcMatchesCache.data; }
}

// Hook : scores live (rafraîchis toutes les 3 min — cache global de toute façon)
function useLiveScores(isAdmin=false) {
  const [liveData, setLiveData] = useState([]);
  const [lastUpdate, setLastUpdate] = useState(null);
  useEffect(() => {
    if(isAdmin) return; // Pas de polling en mode admin
    const run = async () => {
      const data = await fetchWCMatches();
      if (data.length > 0) { setLiveData(data); setLastUpdate(new Date()); }
    };
    run();
    const interval = setInterval(run, 3*60*1000); // 3 minutes
    return () => clearInterval(interval);
  }, [isAdmin]);
  return { liveData, lastUpdate };
}

// Trouver le score live d'un match par ses équipes
function getLiveMatch(liveData, home, away) {
  return liveData.find(m =>
    (m.home === home && m.away === away) ||
    (m.home === away && m.away === home)
  ) || null;
}

const PAIRS = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
const GM = [];
let _n = 1;
Object.entries(GROUPS).forEach(([g,ts]) => PAIRS.forEach(([i,j]) => GM.push({id:`M${String(_n++).padStart(2,"0")}`,g,h:ts[i],a:ts[j]})));
const ALL_TEAMS = Object.values(GROUPS).flat().sort((a,b)=>a.localeCompare(b,"fr"));
const KO_ROUNDS = ["Seizièmes","Huitièmes","Quarts","Demi-finales","Petite finale","Finale"];

const sg = async (key, fb=null) => { try { const r = await dbRef(key).once('value'); const v = r.val(); return v !== null ? v : fb; } catch { return fb; }};
const ss = async (key, val) => { try { await dbRef(key).set(val); } catch {} };

const matchPts = (pred, res) => {
  if (!res||!pred||pred.h===""||pred.a===""||pred.h==null||pred.a==null) return null;
  const [ph,pa,rh,ra]=[+pred.h,+pred.a,+res.h,+res.a];
  if (isNaN(ph)||isNaN(pa)) return null;
  if (ph===rh&&pa===ra) return 2;
  const pw=ph>pa?1:ph<pa?-1:0, rw=rh>ra?1:rh<ra?-1:0;
  return pw===rw?1:0;
};

const calcScore = (preds, res, koM, bonusRes) => {
  if (!preds) return {total:0,exact:0,good:0,bonus:0};
  let exact=0,good=0,bonus=0;
  GM.forEach(m => { const p=matchPts(preds.grp?.[m.id],res?.grp?.[m.id]); if(p===2)exact++; else if(p===1)good++; });
  KO_ROUNDS.forEach(r => (koM?.[r]||[]).forEach(m => { const p=matchPts(preds.ko?.[m.id],res?.ko?.[m.id]); if(p===2)exact++; else if(p===1)good++; }));
  if(bonusRes?.w&&preds.bonus?.w===bonusRes.w) bonus+=10;
  if(bonusRes?.f&&preds.bonus?.f===bonusRes.f) bonus+=8;
  if(bonusRes?.t&&preds.bonus?.t===bonusRes.t) bonus+=4;
  if(bonusRes?.s&&preds.bonus?.s===bonusRes.s) bonus+=6;
  return {total:exact*2+good+bonus,exact,good,bonus};
};

// Classement d'un groupe à partir des résultats officiels
const groupStandings = (groupName, results) => {
  const teams = GROUPS[groupName];
  const stats = {};
  teams.forEach(t => stats[t] = {team:t, group:groupName, pts:0, gf:0, ga:0, gd:0, w:0, d:0, l:0, played:0});
  GM.filter(m => m.g === groupName).forEach(m => {
    const r = results?.grp?.[m.id];
    if (!r || r.h == null || r.a == null) return;
    const h = +r.h, a = +r.a;
    stats[m.h].gf += h; stats[m.h].ga += a; stats[m.h].played++;
    stats[m.a].gf += a; stats[m.a].ga += h; stats[m.a].played++;
    if (h > a) { stats[m.h].pts += 3; stats[m.h].w++; stats[m.a].l++; }
    else if (h < a) { stats[m.a].pts += 3; stats[m.a].w++; stats[m.h].l++; }
    else { stats[m.h].pts += 1; stats[m.a].pts += 1; stats[m.h].d++; stats[m.a].d++; }
  });
  Object.values(stats).forEach(s => s.gd = s.gf - s.ga);
  return Object.values(stats).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    return b.gf - a.gf;
  });
};

// Calcule tous les qualifiés pour les seizièmes
const computeQualified = (results) => {
  const allStandings = {};
  const winners = [], runnersUp = [], thirds = [];
  Object.keys(GROUPS).forEach(g => {
    const st = groupStandings(g, results);
    allStandings[g] = st;
    if (st[0].played > 0) winners.push(st[0]);
    if (st[1].played > 0) runnersUp.push(st[1]);
    if (st[2].played > 0) thirds.push(st[2]);
  });
  // 8 meilleurs 3èmes
  const best3 = [...thirds].sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    return b.gf - a.gf;
  }).slice(0, 8);
  return {standings:allStandings, winners, runnersUp, best3};
};

// Statistiques personnelles d'un joueur
const personalStats = (preds, results, koMatches) => {
  const byTeam = {};
  const allMatches = [
    ...GM.map(m => ({...m, isKo:false})),
    ...KO_ROUNDS.flatMap(r => (koMatches?.[r]||[]).map(m => ({...m, isKo:true})))
  ];
  let totalPlayed = 0, totalExact = 0, totalGood = 0, totalMissed = 0;
  let currentStreak = 0, bestStreak = 0;
  const sortedMatches = [...allMatches].sort((a,b) => (SCHEDULE[a.id]||'').localeCompare(SCHEDULE[b.id]||''));
  sortedMatches.forEach(m => {
    const r = m.isKo ? results?.ko?.[m.id] : results?.grp?.[m.id];
    if (!r) return;
    const p = m.isKo ? preds?.ko?.[m.id] : preds?.grp?.[m.id];
    const pts = matchPts(p, r);
    if (pts == null) return;
    totalPlayed++;
    if (pts === 2) { totalExact++; currentStreak++; }
    else if (pts === 1) { totalGood++; currentStreak++; }
    else { totalMissed++; if (currentStreak > bestStreak) bestStreak = currentStreak; currentStreak = 0; }
    [m.h, m.a].forEach(team => {
      if (!byTeam[team]) byTeam[team] = {team, played:0, exact:0, good:0, missed:0};
      byTeam[team].played++;
      if (pts === 2) byTeam[team].exact++;
      else if (pts === 1) byTeam[team].good++;
      else byTeam[team].missed++;
    });
  });
  if (currentStreak > bestStreak) bestStreak = currentStreak;
  const teamsArr = Object.values(byTeam).filter(t => t.played >= 2);
  const luckyTeam = teamsArr.length > 0 ? teamsArr.reduce((a,b) => {
    const aRate = (a.exact*2 + a.good) / a.played;
    const bRate = (b.exact*2 + b.good) / b.played;
    return bRate > aRate ? b : a;
  }) : null;
  const unluckyTeam = teamsArr.length > 0 ? teamsArr.reduce((a,b) => {
    const aRate = (a.exact*2 + a.good) / a.played;
    const bRate = (b.exact*2 + b.good) / b.played;
    return bRate < aRate ? b : a;
  }) : null;
  const accuracy = totalPlayed > 0 ? Math.round((totalExact*2 + totalGood) / (totalPlayed*2) * 100) : 0;
  return {byTeam, totalPlayed, totalExact, totalGood, totalMissed, currentStreak, bestStreak, luckyTeam, unluckyTeam, accuracy};
};

const isMatchLocked = (kickoff) => {
  if (!kickoff) return false;
  return new Date() >= new Date(new Date(kickoff).getTime() - 30*60*1000);
};

const MatchCard=({match,pred,result,onChangePred,kickoff,live})=>{
  const p=matchPts(pred,result);
  const locked=isMatchLocked(kickoff);
  const bc=p===2?T.green:p===1?T.blue:p===0?T.red:locked?"#f97316":T.border;
  const isLiveNow=live?.isLive;
  return(
    <div style={{background:isLiveNow?"#050f05":locked?"#100a00":T.card,borderRadius:12,padding:"10px 14px",border:`1px solid ${isLiveNow?"#22c55e55":locked?"#f9731644":p!==null?bc+"55":T.border}`,marginBottom:8,opacity:locked&&!isLiveNow?0.85:1}}>
      {/* Date / heure */}
      {kickoff&&(()=>{
        const ko=new Date(kickoff);
        const lock=new Date(ko.getTime()-30*60*1000);
        const dateStr=ko.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"});
        const timeStr=ko.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
        const lockStr=lock.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
        return(
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginBottom:8,fontSize:11,flexWrap:"wrap"}}>

              📅 {dateStr} · {timeStr}
            </span>
            {!locked&&!isLiveNow&&<span style={{color:T.muted}}>🔒 fermeture à {lockStr}</span>}

          </div>

        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
          <SInput value={pred?.h??""} onChange={locked?()=>{}:v=>onChangePred("h",v)} bc={bc}/>

function LeaderboardPage({leaderboard,prevLeaderboard,loading,myPseudo,onRefresh,results,schedule,koMatches,history}){
  const medals=["🥇","🥈","🥉"];
  const[expanded,setExpanded]=useState(null);

  const getPosChange=(pseudo,currentIdx)=>{
    if(!prevLeaderboard||prevLeaderboard.length===0) return null;
    const prevIdx=prevLeaderboard.findIndex(p=>p.pseudo===pseudo);
    if(prevIdx===-1) return null;
    if(prevIdx>currentIdx) return "up";
    if(prevIdx<currentIdx) return "down";
    return "same";
  };

  // Matchs verrouillés uniquement (groupe + KO)
  const lockedGrpMatches=GM.filter(m=>isMatchLocked(schedule?.[m.id]));
  const lockedKoMatches=KO_ROUNDS.flatMap(r=>(koMatches?.[r]||[]).filter(m=>isMatchLocked(schedule?.[m.id])));
  const hasLocked=lockedGrpMatches.length>0||lockedKoMatches.length>0;

  const PredRow=({label,predH,predA,resH,resA,flag1,flag2})=>{
    const p=predH!=null&&predA!=null&&resH!=null?matchPts({h:predH,a:predA},{h:resH,a:resA}):null;
    const hasPred=predH!=null&&predA!=null&&predH!==""&&predA!=="";
    const color=p===2?T.green:p===1?T.blue:p===0?T.red:T.muted;
    return(
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:`1px solid ${T.border}22`}}>
        <div style={{flex:1,fontSize:11,textAlign:"right",color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{flag1} {label.split(" vs ")[0]}</div>
        <div style={{fontSize:12,fontWeight:700,color:hasPred?color:T.muted,background:hasPred?color+"22":"transparent",borderRadius:6,padding:"2px 8px",flexShrink:0,minWidth:44,textAlign:"center"}}>
          {hasPred?`${predH}–${predA}`:"—"}
        </div>
        <div style={{flex:1,fontSize:11,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{flag2} {label.split(" vs ")[1]}</div>
        <div style={{width:22,textAlign:"center",fontSize:11,fontWeight:700,color}}>{p===2?"✓2":p===1?"+1":p===0?"✗":"—"}</div>
      </div>
    );
  };

  return(
    <div style={{paddingTop:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <PageTitle sub={`${leaderboard.length} participant${leaderboard.length>1?"s":""}`}>CLASSEMENT</PageTitle>
        <button onClick={onRefresh} style={{background:T.card2,color:T.muted,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 14px",fontFamily:"Inter,sans-serif",fontSize:13,cursor:"pointer"}}>🔄 Actualiser</button>
      </div>

      {!hasLocked&&(
        <div style={{background:T.card,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:T.muted,border:`1px solid ${T.border}`}}>
          🔒 Les pronostics des autres joueurs seront visibles ici dès qu'un match sera lancé.
        </div>
      )}

      {/* Graphique d'évolution */}
      {history && history.length >= 2 && (
        <div style={{marginBottom:14}}>
          <HistoryGraph history={history} myPseudo={myPseudo}/>
        </div>
      )}

      {loading?(<div style={{textAlign:"center",color:T.muted,padding:40,fontSize:14}}>Calcul des scores en cours…</div>):
       leaderboard.length===0?(<div style={{textAlign:"center",color:T.muted,padding:40,fontSize:14}}>Aucun participant pour le moment.</div>):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {leaderboard.map((p,i)=>{
            const isMe=p.pseudo===myPseudo, isFirst=i===0, isExp=expanded===p.pseudo;
            const change=getPosChange(p.pseudo,i);
            const arrow=change==="up"?"▲":change==="down"?"▼":change==="same"?"—":null;
            const arrowColor=change==="up"?T.green:change==="down"?T.red:T.muted;
            const prev=leaderboard[i-1];
            const next=leaderboard[i+1];
            const isExAequo=prev&&prev.score.total===p.score.total||next&&next.score.total===p.score.total;
            return(
              <div key={p.pseudo}>
                <div
                  onClick={()=>hasLocked&&setExpanded(isExp?null:p.pseudo)}
                  style={{background:isFirst?"linear-gradient(90deg,#1a1300 0%,#10192b 100%)":isMe?"#101d30":T.card,borderRadius:isExp?"14px 14px 0 0":14,padding:"14px 18px",border:`1px solid ${isFirst?T.gold:isMe?T.blue+"66":T.border}`,display:"flex",alignItems:"center",gap:12,cursor:hasLocked?"pointer":"default",transition:"border-radius 0.2s"}}>
                  <div style={{width:36,textAlign:"center",fontSize:22}}>{i<3?medals[i]:<span style={{color:T.muted,fontWeight:700,fontFamily:"Inter,sans-serif"}}>{i+1}</span>}</div>
                  {arrow&&<div style={{fontSize:12,fontWeight:700,color:arrowColor,flexShrink:0,width:16,textAlign:"center"}}>{arrow}</div>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:15,color:isFirst?T.gold:isMe?T.blue:T.text,display:"flex",alignItems:"center",gap:6}}>
                      {p.pseudo}{isMe&&<span style={{fontSize:11,background:T.blue+"33",color:T.blue,borderRadius:10,padding:"1px 6px"}}>moi</span>}
                    </div>
                    <div style={{fontSize:12,color:T.muted,marginTop:2}}>
                      {p.score.exact} exact{p.score.exact>1?"s":""}{p.score.good>0?` · ${p.score.good} bon résultat${p.score.good>1?"s":""}`:""}
                      {p.score.bonus>0?` · +${p.score.bonus} bonus`:""}
                      {isExAequo&&<span style={{marginLeft:6,fontSize:11,color:"#f97316",fontWeight:600}}>ex-æquo</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:34,fontWeight:800,color:isFirst?T.gold:T.text,lineHeight:1}}>
                      {p.score.total}<span style={{fontSize:14,fontFamily:"Inter,sans-serif",color:T.muted,fontWeight:400}}> pts</span>
                    </div>
                    {hasLocked&&<span style={{color:T.muted,fontSize:16}}>{isExp?"▲":"▼"}</span>}
                  </div>
                </div>

                {/* Pronostics détaillés — visibles si match verrouillé */}
                {isExp&&(
                  <div style={{background:"#090e1a",border:`1px solid ${isFirst?T.gold:isMe?T.blue+"66":T.border}`,borderTop:"none",borderRadius:"0 0 14px 14px",padding:"12px 16px"}}>

                    {/* ── STATS GLOBALES ── */}
                    {(()=>{
                      // Calcul stats détaillées
                      const allM=[...GM,...KO_ROUNDS.flatMap(r=>(koMatches?.[r]||[]).map(m=>({...m,isKo:true})))];
                      const played=allM.filter(m=>m.isKo?results?.ko?.[m.id]:results?.grp?.[m.id]);
                      let exact=0,good=0,missed=0;
                      played.forEach(m=>{
                        const pred=m.isKo?p.preds?.ko?.[m.id]:p.preds?.grp?.[m.id];
                        const res=m.isKo?results?.ko?.[m.id]:results?.grp?.[m.id];
                        const pts=matchPts(pred,res);
                        if(pts===2)exact++;
                        else if(pts===1)good++;
                        else if(pts===0)missed++;
                      });
                      const br=results?.bonusResults||{};
                      const bonusW=br.w&&p.preds?.bonus?.w===br.w;
                      const bonusF=br.f&&p.preds?.bonus?.f===br.f;
                      const bonusT=br.t&&p.preds?.bonus?.t===br.t;
                      const bonusS=br.s&&p.preds?.bonus?.s===br.s;
                      const totalBonus=(bonusW?10:0)+(bonusF?8:0)+(bonusT?4:0)+(bonusS?6:0);
                      if(played.length===0) return null;
                      return(
                        <div style={{marginBottom:14}}>
                          <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:10,textTransform:"uppercase"}}>📊 Statistiques — {played.length} match{played.length>1?"s":""} joué{played.length>1?"s":""}</div>
                          {/* Barre visuelle */}
                          <div style={{display:"flex",borderRadius:8,overflow:"hidden",height:10,marginBottom:14,gap:2}}>
                            {exact>0&&<div style={{flex:exact,background:T.green,borderRadius:"4px 0 0 4px"}} title={`${exact} exacts`}/>}
                            {good>0&&<div style={{flex:good,background:T.blue}} title={`${good} bons`}/>}
                            {missed>0&&<div style={{flex:missed,background:T.red,borderRadius:"0 4px 4px 0"}} title={`${missed} ratés`}/>}
                          </div>
                          {/* Chiffres */}
                          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                            {[
                              {icon:"🎯",label:"Score exact",val:exact,pts:`${exact*2} pts`,color:T.green},
                              {icon:"✅",label:"Bon résultat",val:good,pts:`${good} pt${good>1?"s":""}`,color:T.blue},
                              {icon:"❌",label:"Raté",val:missed,pts:"0 pt",color:T.red},
                            ].map(({icon,label,val,pts,color})=>(
                              <div key={label} style={{flex:1,minWidth:80,background:T.card,borderRadius:10,padding:"10px 8px",textAlign:"center",border:`1px solid ${color}33`}}>
                                <div style={{fontSize:20,marginBottom:2}}>{icon}</div>
                                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color,lineHeight:1}}>{val}</div>
                                <div style={{fontSize:10,color:T.muted,marginTop:2}}>{label}</div>
                                <div style={{fontSize:11,color,fontWeight:600,marginTop:1}}>{pts}</div>
                              </div>
                            ))}
                          </div>
                          {/* Bonus */}
                          <div style={{background:T.card,borderRadius:10,padding:"10px 14px",border:`1px solid ${T.border}`}}>
                            <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>Pronostics bonus</div>
                            <div style={{display:"flex",flexDirection:"column",gap:4}}>
                              {[
                                {icon:"🏆",label:"Vainqueur",val:p.preds?.bonus?.w,res:br.w,pts:10},
                                {icon:"🥈",label:"Finaliste",val:p.preds?.bonus?.f,res:br.f,pts:8},
                                {icon:"🥉",label:"3ème place",val:p.preds?.bonus?.t,res:br.t,pts:4},
                                {icon:"⚽",label:"Meilleur buteur",val:p.preds?.bonus?.s,res:br.s,pts:6},
                              ].map(({icon,label,val,res,pts})=>{
                                const ok=res&&val===res;
                                const wrong=res&&val&&val!==res;
                                return(
                                  <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${T.border}22`,fontSize:12}}>
                                    <span style={{color:T.muted}}>{icon} {label}</span>
                                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                                      <span style={{fontWeight:600,color:ok?T.green:wrong?T.red:val?T.text:T.muted}}>{val||"—"}</span>
                                      {ok&&<span style={{fontSize:11,fontWeight:700,color:T.green,background:T.green+"22",borderRadius:20,padding:"1px 8px"}}>✓ +{pts} pts</span>}
                                      {wrong&&<span style={{fontSize:11,fontWeight:700,color:T.red,background:T.red+"22",borderRadius:20,padding:"1px 8px"}}>✗ 0 pt</span>}
                                      {!res&&<span style={{fontSize:11,color:T.muted}}>En attente</span>}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                            {totalBonus>0&&(
                              <div style={{marginTop:8,textAlign:"right",fontSize:13,fontWeight:700,color:T.gold}}>Total bonus : +{totalBonus} pts 🌟</div>
                            )}
                          </div>
                        </div>
                      );
                    })()}

                    {/* Détail matchs verrouillés */}
                    {lockedGrpMatches.length>0&&(
                      <>
                        <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>Matchs de groupe lancés</div>
                        {lockedGrpMatches.map(m=>(
                          <PredRow key={m.id} label={`${m.h} vs ${m.a}`}
                            predH={p.preds?.grp?.[m.id]?.h} predA={p.preds?.grp?.[m.id]?.a}
                            resH={results?.grp?.[m.id]?.h} resA={results?.grp?.[m.id]?.a}
                            flag1={F[m.h]||"🏳"} flag2={F[m.a]||"🏳"}/>
                        ))}
                      </>
                    )}
                    {lockedKoMatches.length>0&&(
                      <>
                        <div style={{fontSize:11,fontWeight:600,color:T.muted,letterSpacing:1,margin:"12px 0 8px",textTransform:"uppercase"}}>Phase finale lancée</div>
                        {lockedKoMatches.map(m=>(
                          <PredRow key={m.id} label={`${m.h} vs ${m.a}`}
                            predH={p.preds?.ko?.[m.id]?.h} predA={p.preds?.ko?.[m.id]?.a}
                            resH={results?.ko?.[m.id]?.h} resA={results?.ko?.[m.id]?.a}
                            flag1={F[m.h]||"🏳"} flag2={F[m.a]||"🏳"}/>
                        ))}
                      </>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function BonusAdmin({settings,saveSettings}){
  const br=settings.bonusResults||{};
  const[w,setW]=useState(br.w||"");
  const[f,setF]=useState(br.f||"");
  const[t,setT]=useState(br.t||"");
  const[s,setS]=useState(br.s||"");
  const[saved,setSaved]=useState({});
  const save=(key,val)=>{
    saveSettings({bonusResults:{...settings.bonusResults,[key]:val}});
    setSaved(p=>({...p,[key]:true}));
    setTimeout(()=>setSaved(p=>{const n={...p};delete n[key];return n;}),2000);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {[
        {key:"w",icon:"🏆",label:"Vainqueur officiel",pts:10,type:"select",val:w,set:setW},
        {key:"f",icon:"🥈",label:"Finaliste officiel",pts:8,type:"select",val:f,set:setF},
        {key:"t",icon:"🥉",label:"3ème place officielle",pts:4,type:"select",val:t,set:setT},
      ].map(({key,icon,label,pts,val,set})=>(
        <div key={key} style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:T.gold}}>{icon} {label}</div>
            <span style={{background:T.card2,color:T.gold,borderRadius:20,padding:"2px 12px",fontSize:13,fontWeight:700}}>+{pts} pts</span>
          </div>
          <select value={val} onChange={e=>set(e.target.value)} style={{width:"100%",background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",color:val?"#fff":T.muted,fontFamily:"Inter,sans-serif",fontSize:14,outline:"none",marginBottom:10}}>
            <option value="">-- Sélectionner --</option>
            {ALL_TEAMS.map(t=><option key={t} value={t}>{F[t]||"🏳"} {t}</option>)}
          </select>
          <button onClick={()=>save(key,val)} style={{background:saved[key]?T.green:T.green,color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontFamily:"Inter,sans-serif",fontWeight:600,fontSize:14,cursor:"pointer"}}>{saved[key]?"✓ Enregistré":"Enregistrer"}</button>
          {settings.bonusResults?.[key]&&<span style={{marginLeft:10,fontSize:13,color:T.muted}}>Actuel : <strong style={{color:T.text}}>{F[settings.bonusResults[key]]||""} {settings.bonusResults[key]}</strong></span>}
        </div>
      ))}
      {/* Meilleur buteur — composant isolé pour éviter le bug de focus */}
      <ScorerInput key="scorer-input-stable" settings={settings} saveSettings={saveSettings}/>
    </div>
  );
}

function AddPlayerAdmin({onAdd}){
  const[name,setName]=useState("");
  const[pwd,setPwd]=useState("");
  const[msg,setMsg]=useState("");
  const handle=async()=>{
    if(!name.trim()||!pwd.trim()){setMsg("⚠ Remplis les deux champs.");return;}
    await onAdd(name.trim(),pwd.trim());
    setMsg(`✓ ${name.trim()} ajouté !`);
    setName("");setPwd("");
    setTimeout(()=>setMsg(""),2500);
  };
  return(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Pseudo" style={{flex:1,minWidth:100,background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:"#fff",fontFamily:"Inter,sans-serif",fontSize:14,outline:"none"}}/>
        <input value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Mot de passe" type="text" style={{flex:1,minWidth:100,background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:"#fff",fontFamily:"Inter,sans-serif",fontSize:14,outline:"none"}}/>
        <button onClick={handle} style={{background:T.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontFamily:"Inter,sans-serif",fontWeight:600,fontSize:14,cursor:"pointer",flexShrink:0}}>Ajouter</button>
      </div>
      {msg&&<div style={{marginTop:8,fontSize:13,color:msg.startsWith("✓")?T.green:T.red,fontWeight:500}}>{msg}</div>}
    </div>
  );
}


function NotifAdmin({players,results,leaderboard,prevLeaderboard}){
  const[custom,setCustom]=useState("");
  const[sent,setSent]=useState([]);
  const[sending,setSending]=useState(false);
  const[allNotifs,setAllNotifs]=useState([]);
  const[editId,setEditId]=useState(null);
  const[editMsg,setEditMsg]=useState("");

  useEffect(()=>{
    sg("notifs",[]).then(n=>setAllNotifs(n||[]));
  },[]);

  const sendNotif=async(msg)=>{
    if(!msg.trim())return;
    setSending(true);
    const notif={msg,ts:new Date().toISOString(),id:Date.now()};
    const prev=await sg("notifs",[]);
    const updated=[notif,...(prev||[])].slice(0,50);
    await ss("notifs",updated);
    // Envoyer push notification
    try{ await sendPushNotification(msg); }catch(e){ console.log('push err',e); }
    setSent(p=>[notif,...p]);
    setAllNotifs(updated);
    setSending(false);
    setCustom("");
  };

  const deleteNotif=async(id)=>{
    const updated=allNotifs.filter(n=>n.id!==id);
    await ss("notifs",updated);
    setAllNotifs(updated);
  };

  const startEdit=(n)=>{setEditId(n.id);setEditMsg(n.msg);};
  const saveEdit=async()=>{
    const updated=allNotifs.map(n=>n.id===editId?{...n,msg:editMsg}:n);
    await ss("notifs",updated);
    setAllNotifs(updated);
    setEditId(null);setEditMsg("");
  };
  const suggestions=[];
  if(leaderboard.length>0){
    const first=leaderboard[0];
    suggestions.push({icon:"👑",label:"Leader du classement",msg:`👑 ${first.pseudo} est en tête avec ${first.score.total} pts (${first.score.exact} score${first.score.exact>1?"s":""} exact${first.score.exact>1?"s":""}, ${first.score.good} bon résultat${first.score.good>1?"s":""}) !`});
    if(prevLeaderboard&&prevLeaderboard.length>0){
      leaderboard.forEach((p,currIdx)=>{
        const prevIdx=prevLeaderboard.findIndex(x=>x.pseudo===p.pseudo);
        if(prevIdx===-1)return;
        const gained=prevIdx-currIdx;
        if(gained>=3) suggestions.push({icon:"🚀",label:`Remontée — ${p.pseudo}`,msg:`🚀 Remontada de ${p.pseudo} ! De la ${prevIdx+1}ème à la ${currIdx+1}ème place en quelques matchs. Le classement tremble ! 🔥`});
        if(gained<=-3){const lost=Math.abs(gained);suggestions.push({icon:"📉",label:`Chute — ${p.pseudo}`,msg:`📉 ${p.pseudo} dégringole de ${lost} place${lost>1?"s":""} ! De la ${prevIdx+1}ème à la ${currIdx+1}ème place… Difficile.`});}
      });
    }
    [5,10,20,30,50].forEach(n=>{
      const found=leaderboard.find(p=>(p.score.exact+p.score.good)>=n);
      if(found) suggestions.push({icon:"🏅",label:`1er à ${n} matchs trouvés`,msg:`🏅 ${found.pseudo} est le/la premier(e) à avoir trouvé ${n} matchs ! ${found.score.exact} score${found.score.exact>1?"s":""} exact${found.score.exact>1?"s":""} + ${found.score.good} bon résultat${found.score.good>1?"s":""}. Impressionnant !`});
    });
    const bestExact=leaderboard.reduce((a,b)=>a.score.exact>b.score.exact?a:b);
    if(bestExact.score.exact>0) suggestions.push({icon:"🎯",label:"Meilleur pronostiqueur",msg:`🎯 ${bestExact.pseudo} est le/la plus précis(e) avec ${bestExact.score.exact} score${bestExact.score.exact>1?"s":""} exact${bestExact.score.exact>1?"s":""} ! Chapeau bas.`});
    if(leaderboard.length>1){
      const last=leaderboard[leaderboard.length-1];
      suggestions.push({icon:"🔦",label:"Lanterne rouge",msg:`🔦 ${last.pseudo} ferme la marche avec ${last.score.total} pts, à ${leaderboard[0].score.total-last.score.total} pts du leader. Tout est encore possible ! 💪`});
      const gap2=leaderboard[0].score.total-leaderboard[1].score.total;
      if(gap2<=3) suggestions.push({icon:"⚡",label:"Tête-à-tête serré",msg:`⚡ Seulement ${gap2} pt${gap2>1?"s":""} entre ${leaderboard[0].pseudo} et ${leaderboard[1].pseudo} ! Le moindre match peut tout changer 😱`});
    }
    suggestions.push({icon:"⏰",label:"Rappel pronostics",msg:"⏰ N\'oublie pas de remplir tes pronostics avant le coup d\'envoi ! 🔒"});
    suggestions.push({icon:"⚽",label:"Soirée match",msg:"⚽ Match ce soir ! Vérifiez votre pronostic et suivez le score en direct dans l\'app 📱"});
    suggestions.push({icon:"🏆",label:"Rappel bonus",msg:"🏆 Vos pronostics bonus ? Vainqueur, finaliste, 3ème place et meilleur buteur = jusqu\'à 28 pts bonus !"});
  }
  return(
    <div style={{paddingTop:4}}>
      <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`,marginBottom:16}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:T.gold,marginBottom:12}}>✍️ Message libre</div>
        <textarea value={custom} onChange={e=>setCustom(e.target.value)} placeholder="Écris ton message ici…" rows={3} style={{width:"100%",background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 14px",color:"#fff",fontFamily:"Inter,sans-serif",fontSize:14,outline:"none",resize:"vertical",marginBottom:10}}/>
        <button onClick={()=>sendNotif(custom)} disabled={sending||!custom.trim()} style={{background:custom.trim()?T.gold:"#1a2030",color:custom.trim()?"#030609":T.muted,border:"none",borderRadius:10,padding:"11px 24px",fontFamily:"Inter,sans-serif",fontWeight:700,fontSize:15,cursor:custom.trim()?"pointer":"not-allowed"}}>
          {sending?"Envoi…":"📨 Envoyer à tous"}
        </button>
      </div>
      <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`,marginBottom:16}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:T.gold,marginBottom:4}}>⚡ Suggestions intelligentes</div>
        <p style={{color:T.muted,fontSize:12,margin:"0 0 14px"}}>Basées sur le classement actuel. Cliquez pour modifier puis envoyer.</p>
        {leaderboard.length===0?(<div style={{color:T.muted,fontSize:13,textAlign:"center",padding:20}}>Actualisez le classement pour générer des suggestions.</div>):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {suggestions.map((s,i)=>(
              <div key={i} onClick={()=>setCustom(s.msg)} style={{background:T.card2,borderRadius:10,padding:"10px 14px",border:`1px solid ${T.border}`,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                  <span style={{fontSize:18,flexShrink:0}}>{s.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:700,color:T.blue,marginBottom:3}}>{s.label}</div>
                    <div style={{fontSize:12,color:T.muted,lineHeight:1.5}}>{s.msg}</div>
                  </div>
                  <span style={{fontSize:11,color:T.blue,flexShrink:0}}>→</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
      {allNotifs.length>0&&(
        <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:T.gold,marginBottom:12}}>📋 Notifications envoyées ({allNotifs.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {allNotifs.map(n=>(
              <div key={n.id} style={{background:T.card2,borderRadius:8,padding:"10px 12px",fontSize:13,color:T.text,border:`1px solid ${T.border}`}}>
                {editId===n.id?(
                  <div>
                    <textarea value={editMsg} onChange={e=>setEditMsg(e.target.value)} rows={2} style={{width:"100%",background:"#111b2d",border:`1px solid ${T.blue}`,borderRadius:8,padding:"8px",color:"#fff",fontFamily:"Inter,sans-serif",fontSize:13,outline:"none",resize:"vertical",marginBottom:8}}/>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={saveEdit} style={{background:T.green,color:"#fff",border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✓ Sauvegarder</button>
                      <button onClick={()=>setEditId(null)} style={{background:T.card,color:T.muted,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer"}}>Annuler</button>
                    </div>
                  </div>
                ):(
                  <div>
                    <div style={{marginBottom:6,lineHeight:1.5}}>{n.msg}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontSize:11,color:T.muted}}>{new Date(n.ts).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>startEdit(n)} style={{background:T.card,color:T.blue,border:`1px solid ${T.blue}44`,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>✏️ Modifier</button>
                        <button onClick={()=>deleteNotif(n.id)} style={{background:T.card,color:T.red,border:`1px solid ${T.red}44`,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>🗑️ Supprimer</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ScorerInput({settings,saveSettings}){
  const br=settings.bonusResults||{};
  const[val,setVal]=useState(br.s||"");
  const[saved,setSaved]=useState(false);
  const save=()=>{
    saveSettings({bonusResults:{...br,s:val}});
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  return(
    <div style={{background:T.card,borderRadius:14,padding:20,border:`1px solid ${T.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,color:T.gold}}>⚽ Meilleur buteur officiel</div>
        <span style={{background:T.card2,color:T.gold,borderRadius:20,padding:"2px 12px",fontSize:13,fontWeight:700}}>+6 pts</span>
      </div>
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&save()} placeholder="Nom du joueur" style={{width:"100%",background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"10px 12px",color:"#fff",fontFamily:"Inter,sans-serif",fontSize:14,outline:"none",marginBottom:10}}/>
      <button onClick={save} style={{background:T.green,color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontFamily:"Inter,sans-serif",fontWeight:600,fontSize:14,cursor:"pointer"}}>{saved?"✓ Enregistré":"Enregistrer"}</button>
      {br.s&&<span style={{marginLeft:10,fontSize:13,color:T.muted}}>Actuel : <strong style={{color:T.text}}>{br.s}</strong></span>}
    </div>
  );
}
function DeleteParticipantAdmin({players,onDelete}){
  const[selected,setSelected]=useState("");
  const[confirm,setConfirm]=useState(false);
  const[msg,setMsg]=useState("");
  const handleDelete=async()=>{
    if(!selected)return;
    if(!confirm){setConfirm(true);return;}
    await onDelete(selected);
    setMsg(`✓ ${selected} supprimé !`);
    setSelected("");setConfirm(false);
    setTimeout(()=>setMsg(""),3000);
  };
  if(Object.keys(players).length===0) return <p style={{color:T.muted,fontSize:13,margin:0}}>Aucun participant.</p>;
  return(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
        <select value={selected} onChange={e=>{setSelected(e.target.value);setConfirm(false);}} style={{flex:1,minWidth:150,background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:selected?"#fff":T.muted,fontFamily:"Inter,sans-serif",fontSize:14,outline:"none"}}>
          <option value="">— Choisir un participant —</option>
          {Object.keys(players).map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <button onClick={handleDelete} disabled={!selected} style={{background:confirm?T.red:"#3a1010",color:confirm?"#fff":T.red,border:`1px solid ${T.red}66`,borderRadius:8,padding:"9px 16px",fontFamily:"Inter,sans-serif",fontWeight:600,fontSize:14,cursor:selected?"pointer":"not-allowed",flexShrink:0}}>
          {confirm?"⚠️ Confirmer":"🗑️ Supprimer"}
        </button>
      </div>
      {confirm&&<div style={{fontSize:12,color:T.red,marginBottom:6}}>⚠️ Cela supprimera aussi tous les pronostics de {selected}. Cliquez à nouveau pour confirmer.</div>}
      {msg&&<div style={{fontSize:13,fontWeight:500,color:T.green}}>{msg}</div>}
    </div>
  );
}

function ResetPasswordAdmin({players}){
  const[selected,setSelected]=useState("");
  const[newPwd,setNewPwd]=useState("");
  const[showPwd,setShowPwd]=useState(false);
  const[msg,setMsg]=useState("");

  const handleReset=async()=>{
    if(!selected||!newPwd.trim()){setMsg("⚠ Choisis un participant et un nouveau mot de passe.");return;}
    await ss(`passwords/${selected}`,newPwd.trim());
    setMsg(`✓ Mot de passe de ${selected} réinitialisé !`);
    setNewPwd("");setSelected("");
    setTimeout(()=>setMsg(""),3000);
  };

  if(Object.keys(players).length===0) return <p style={{color:T.muted,fontSize:13,margin:0}}>Aucun participant encore.</p>;

  return(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        <select value={selected} onChange={e=>setSelected(e.target.value)}
          style={{flex:1,minWidth:120,background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 12px",color:selected?"#fff":T.muted,fontFamily:"Inter,sans-serif",fontSize:14,outline:"none"}}>
          <option value="">— Choisir un participant —</option>
          {Object.keys(players).map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <div style={{position:"relative",flex:1,minWidth:140}}>
          <input value={newPwd} onChange={e=>setNewPwd(e.target.value)} placeholder="Nouveau mot de passe"
            type={showPwd?"text":"password"}
            style={{width:"100%",background:"#111b2d",border:`1px solid ${T.border}`,borderRadius:8,padding:"9px 40px 9px 12px",color:"#fff",fontFamily:"Inter,sans-serif",fontSize:14,outline:"none"}}/>
          <button onClick={()=>setShowPwd(!showPwd)} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:T.muted}}>
            {showPwd?"🙈":"👁"}
          </button>
        </div>
        <button onClick={handleReset}
          style={{background:T.red,color:"#fff",border:"none",borderRadius:8,padding:"9px 16px",fontFamily:"Inter,sans-serif",fontWeight:600,fontSize:14,cursor:"pointer",flexShrink:0}}>
          Réinitialiser
        </button>
      </div>
      {msg&&<div style={{fontSize:13,fontWeight:500,color:msg.startsWith("✓")?T.green:T.red}}>{msg}</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:12}}>
        {Object.keys(players).map(p=>(
          <span key={p} style={{background:T.card2,border:`1px solid ${T.border}`,padding:"4px 12px",borderRadius:20,fontSize:13,color:T.text,cursor:"pointer"}}
            onClick={()=>setSelected(p)}>
            {p}
          </span>
        ))}
      </div>
    </div>
  );
}

function QualificationsPanel({results,koMatches,addKoMatch}){
  const[expanded,setExpanded]=useState(false);
  const[msg,setMsg]=useState("");
  const qual = computeQualified(results);
  const totalQualified = qual.winners.length + qual.runnersUp.length + qual.best3.length;
  const allGroupsPlayed = qual.winners.length===12 && qual.runnersUp.length===12 && qual.best3.length===8;

  const autoCreateSeizièmes = async () => {
    if (!allGroupsPlayed) { setMsg("⚠ Tous les groupes ne sont pas terminés."); setTimeout(()=>setMsg(""),3000); return; }
    if ((koMatches["Seizièmes"]||[]).length > 0) { setMsg("⚠ Des seizièmes existent déjà. Supprimez-les d'abord."); setTimeout(()=>setMsg(""),4000); return; }
    // Pairing simple : 1er Grp A vs meilleur 3ème, 2ème Grp B vs 1er Grp F, etc.
    // Schéma FIFA 2026 simplifié - peut être ajusté manuellement après
    const W = qual.winners, R = qual.runnersUp, T3 = qual.best3;
    const pairs = [
      [W[0],T3[5]],[R[5],R[7]],[W[2],T3[7]],[W[3],R[2]],
      [W[1],T3[6]],[R[0],R[3]],[W[7],T3[1]],[W[5],R[6]],
      [W[6],R[10]],[R[4],T3[0]],[W[10],T3[2]],[W[8],R[11]],
      [W[4],T3[3]],[R[1],R[9]],[W[11],T3[4]],[W[9],R[8]],
    ];
    for (const [h,a] of pairs) {
      if (h && a) await addKoMatch("Seizièmes", h.team, a.team);
    }
    setMsg("✓ 16 matchs des seizièmes créés ! Vous pouvez les ajuster manuellement.");
    setTimeout(()=>setMsg(""),5000);
  };

  return(
    <div style={{background:"linear-gradient(135deg,#0a2a1a,#0d1a30)",borderRadius:14,padding:20,marginBottom:16,border:"1px solid #22c55e44"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

function AdminPage({results,settings,koMatches,players,saveResult,deleteResult,saveSettings,addKoMatch,removeKoMatch,adminTab,setAdminTab,activeGroup,setActiveGroup,activeRound,setActiveRound,setResults,setPlayers,leaderboard,prevLeaderboard,loadLeaderboard}){
  const[tmp,setTmp]=useState({});
  const[newH,setNewH]=useState("");
  const[newA,setNewA]=useState("");
  const[bonW,setBonW]=useState(settings.bonusResults?.w||"");
  const[bonS,setBonS]=useState(settings.bonusResults?.s||"");
  const[saved,setSaved]=useState({});
  const[syncing,setSyncing]=useState(false);
  const[syncMsg,setSyncMsg]=useState("");

  const getV=(type,id,field)=>{const k=`${type}_${id}_${field}`;return k in tmp?tmp[k]:(results[type]?.[id]?.[field]??"");};
  const setV=(type,id,field,v)=>setTmp(p=>({...p,[`${type}_${id}_${field}`]:v}));
  const doSave=(type,id)=>{
    const h=getV(type,id,"h"),a=getV(type,id,"a");
    if(h!==""&&a!==""){saveResult(type,id,+h,+a);setSaved(p=>({...p,[id]:true}));setTimeout(()=>setSaved(p=>{const n={...p};delete n[id];return n;}),2000);}
  };

  // ── SYNC AUTOMATIQUE — Phase de groupes (via football-data.org)
  const syncGroupResults = async () => {
    setSyncing(true); setSyncMsg("🔍 Récupération des scores officiels…");
    try {
      const wcMatches = await fetchScoresFromWeb();
      if (wcMatches.length === 0) { setSyncMsg("⚠ Impossible de récupérer les données. Réessayez."); setSyncing(false); return; }
      const finishedOnly = wcMatches.filter(m => m.isFinished && m.scoreH != null && m.scoreA != null);
      if (finishedOnly.length === 0) { setSyncMsg("ℹ️ Aucun match terminé trouvé pour le moment."); setSyncing(false); return; }
      let count = 0;
      const grp = { ...results.grp };
      // Match par noms d'équipes (home + away dans n'importe quel ordre)
      GM.forEach(local => {
        const found = finishedOnly.find(api =>
          (api.home === local.h && api.away === local.a) ||
          (api.home === local.a && api.away === local.h)
        );
        if (found) {
          // Si l'API a inversé l'ordre, on inverse aussi le score
          const sameOrder = found.home === local.h;
          grp[local.id] = sameOrder ? { h: +found.scoreH, a: +found.scoreA } : { h: +found.scoreA, a: +found.scoreH };
          count++;
        }
      });
      const updated = { ...results, grp };
      setResults(updated);
      await ss("results", updated);
      setSyncMsg(`✓ ${count} résultat${count>1?"s":""} mis à jour automatiquement !`);

      setSyncMsg(`⚠ Erreur : ${e.message}. Réessayez.`);

function HistoryGraph({history, myPseudo}){
  if (!history || history.length < 2) {
    return(
      <div style={{background:T.card,borderRadius:12,padding:24,textAlign:"center",border:`1px solid ${T.border}`,color:T.muted,fontSize:13}}>
        📈 L'historique apparaîtra après plusieurs journées de matchs.
      </div>
    );
  }
  const W = 320, H = 200, padL = 30, padR = 10, padT = 15, padB = 25;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const players = Array.from(new Set(history.flatMap(s => s.board.map(p => p.pseudo))));
  const maxPos = players.length;
  const colors = ["#fbbf24","#22c55e","#60a5fa","#f87171","#a78bfa","#f97316","#ec4899","#14b8a6","#84cc16","#eab308"];
  const playerLines = players.map((pseudo, idx) => {
    const points = history.map((snap, i) => {
      const found = snap.board.findIndex(p => p.pseudo === pseudo);
      const pos = found === -1 ? maxPos : found + 1;
      const x = padL + (i/(history.length-1)) * innerW;
      const y = padT + ((pos-1)/(Math.max(1,maxPos-1))) * innerH;
      return {x, y};
    });
    return {pseudo, points, color: pseudo === myPseudo ? "#fbbf24" : colors[idx % colors.length]};
  });
  return(
    <div style={{background:T.card,borderRadius:12,padding:14,border:`1px solid ${T.border}`,overflow:"auto"}}>
      <div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>📈 Évolution du classement</div>

function TodaySection({preds,schedule,results,koMatches,onSelectMatch}){
  const now = new Date();
  const in24h = new Date(now.getTime() + 24*60*60*1000);
  const allMatches = [
    ...GM.map(m => ({...m, type:"grp"})),
    ...KO_ROUNDS.flatMap(r => (koMatches?.[r]||[]).map(m => ({...m, type:"ko"})))
  ];
  const upcoming = allMatches
    .filter(m => {
      const ko = schedule[m.id];
      if (!ko) return false;
      const koDate = new Date(ko);
      return koDate >= now && koDate <= in24h;
    })
    .sort((a,b) => new Date(schedule[a.id]) - new Date(schedule[b.id]));

  if (upcoming.length === 0) return null;

  const notPredicted = upcoming.filter(m => {
    const p = m.type === "grp" ? preds.grp?.[m.id] : preds.ko?.[m.id];
    return !p || p.h === "" || p.h == null;
  });

  return(
    <div style={{background:"linear-gradient(135deg,#10192b,#0a2a1a)",borderRadius:14,padding:16,marginBottom:16,border:"1px solid #22c55e44"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:17,fontWeight:700,color:T.green}}>⚡ Matchs des prochaines 24h</div>
        {notPredicted.length>0 && <span style={{fontSize:11,color:T.red,background:T.red+"22",padding:"2px 8px",borderRadius:20,fontWeight:600}}>⚠️ {notPredicted.length} à pronostiquer</span>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {upcoming.slice(0,5).map(m => {
          const ko = new Date(schedule[m.id]);
          const timeStr = ko.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
          const isToday = ko.toDateString() === now.toDateString();
          const dayStr = isToday ? "Aujourd'hui" : ko.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"});
          const p = m.type === "grp" ? preds.grp?.[m.id] : preds.ko?.[m.id];
          const hasPred = p && p.h !== "" && p.h != null;
          return(
            <div key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:T.card,borderRadius:8,padding:"8px 12px",border:`1px solid ${hasPred?T.green+"44":T.red+"44"}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1}}>
                <div style={{fontSize:11,color:T.blue,fontWeight:600,flexShrink:0,minWidth:80}}>{dayStr} · {timeStr}</div>
                <div style={{fontSize:13,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{F[m.h]||"🏳"} {m.h} <span style={{color:T.muted}}>vs</span> {F[m.a]||"🏳"} {m.a}</div>
              </div>
              {hasPred ? <span style={{fontSize:12,color:T.green,fontWeight:700,flexShrink:0}}>{p.h}–{p.a}</span> : <span style={{fontSize:11,color:T.red,fontWeight:600,flexShrink:0}}>⚠️ vide</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FinalRecap({results,koMatches,leaderboard,history,settings}){
  const finalMatch = (koMatches?.["Finale"]||[])[0];
  const finalRes = finalMatch ? results?.ko?.[finalMatch.id] : null;
  const isFinished = finalRes && finalRes.h != null;
  if (!isFinished || leaderboard.length === 0) return null;
  const winner = finalRes.h > finalRes.a ? finalMatch.h : finalRes.a > finalRes.h ? finalMatch.a : null;
  const champion = leaderboard[0];
  const bestExact = [...leaderboard].sort((a,b) => b.score.exact - a.score.exact)[0];
  // Plus grosse remontée
  let biggestComeback = null;
  if (history && history.length >= 2) {
    const first = history[0].board;
    const last = history[history.length-1].board;
    leaderboard.forEach(p => {
      const startIdx = first.findIndex(x => x.pseudo === p.pseudo);
      const endIdx = last.findIndex(x => x.pseudo === p.pseudo);
      if (startIdx === -1 || endIdx === -1) return;
      const gain = startIdx - endIdx;
      if (!biggestComeback || gain > biggestComeback.gain) biggestComeback = {pseudo:p.pseudo, gain, from:startIdx+1, to:endIdx+1};
    });
  }
  return(
    <div style={{background:"linear-gradient(135deg,#1a1300,#0d1a30,#10192b)",borderRadius:16,padding:24,marginBottom:16,border:`2px solid ${T.gold}`}}>
      <div style={{textAlign:"center",marginBottom:20}}>

        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:800,color:T.gold,letterSpacing:2}}>FIN DU TOURNOI</div>
        <div style={{fontSize:14,color:T.muted,marginTop:6}}>Voici le récapitulatif d'Andiamo CDM 2026</div>
      </div>
      {winner && (
        <div style={{textAlign:"center",marginBottom:18,padding:16,background:"#0a2a1a",borderRadius:12,border:`1px solid ${T.green}44`}}>
          <div style={{fontSize:12,color:T.muted,marginBottom:4}}>VAINQUEUR DE LA COUPE</div>
          <div style={{fontSize:36}}>{F[winner]||"🏳"}</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:T.green}}>{winner}</div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
        <div style={{background:T.card,borderRadius:10,padding:14,textAlign:"center",border:`1px solid ${T.gold}44`}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>👑 CHAMPION ANDIAMO</div>
          <div style={{fontSize:18,fontWeight:800,color:T.gold}}>{champion.pseudo}</div>
          <div style={{fontSize:12,color:T.muted}}>{champion.score.total} pts</div>
        </div>
        <div style={{background:T.card,borderRadius:10,padding:14,textAlign:"center",border:`1px solid ${T.green}44`}}>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>🎯 MEILLEUR PRONOS</div>

          <div style={{fontSize:12,color:T.muted}}>{bestExact.score.exact} scores exacts</div>

function App(){

  const[results,setResults]=useState({grp:{},ko:{}});
  const[settings,setSettings]=useState({phase:"groups",bonusResults:{}});
  const[koMatches,setKoMatches]=useState({});
  const[loading,setLoading]=useState(true);
  const[saved,setSaved]=useState("");
  const[activeGroup,setActiveGroup]=useState("A");
  const[activeRound,setActiveRound]=useState("Seizièmes");
  const[adminTab,setAdminTab]=useState("groups");
  const[leaderboard,setLeaderboard]=useState([]);
  const[prevLeaderboard,setPrevLeaderboard]=useState([]);
  const[notifs,setNotifs]=useState([]);
  const[lastSeenNotif,setLastSeenNotif]=useState(null);
  const[lbLoading,setLbLoading]=useState(false);
  const[schedule,setSchedule]=useState({});
  const[scheduleLoading,setScheduleLoading]=useState(true);
  const[history,setHistory]=useState([]);
  const lastResultsHashRef=useRef("");
  const { liveData, lastUpdate } = useLiveScores(isAdmin);

  const saveTimer=useRef(null);
  const predsRef=useRef(preds); predsRef.current=preds;
  const pseudoRef=useRef(pseudo); pseudoRef.current=pseudo;
  const resultsRef=useRef(results); resultsRef.current=results;
  const koMatchesRef=useRef(koMatches); koMatchesRef.current=koMatches;
  const settingsRef=useRef(settings); settingsRef.current=settings;
  const playersRef=useRef(players); playersRef.current=players;

  useEffect(()=>{
    (async()=>{
      const[pl,res,set,ko,nf,hi]=await Promise.all([sg("players",{}),sg("results",{grp:{},ko:{}}),sg("settings",{phase:"groups",bonusResults:{}}),sg("koMatches",{}),sg("notifs",[]),sg("leaderboard_history",[])]);
      setPlayers(pl);setResults(res);setSettings(set);setKoMatches(ko);setNotifs(nf||[]);setHistory(hi||[]);setLoading(false);
      setSchedule(SCHEDULE);
      setScheduleLoading(false);
      // Récupération automatique du pseudo sauvegardé
      try {
        const savedPseudo = localStorage.getItem("wc26_my_pseudo");
        const savedPwd = localStorage.getItem("wc26_my_pwd");
        if (savedPseudo && savedPwd && savedPseudo !== "__admin") {
          const storedPwd = await sg(`passwords/${savedPseudo}`, null);
          if (!storedPwd || storedPwd === savedPwd) {
            setPseudo(savedPseudo);
            setPage("groups");
          }
        }
      } catch {}
    })();
  },[]);

  useEffect(()=>{
    if(!pseudo||pseudo==="__admin")return;
    sg(`predictions/${pseudo}`,{grp:{},ko:{},bonus:{}}).then(p=>setPreds(p||{grp:{},ko:{},bonus:{}}));
  },[pseudo]);

  useEffect(()=>{
    const poll=async()=>{const nf=await sg("notifs",[]);if(nf)setNotifs(nf);};
    const interval=setInterval(poll,30000);
    return()=>clearInterval(interval);
  },[]);

  const unreadCount=notifs.filter(n=>!lastSeenNotif||n.ts>lastSeenNotif).length;

  const scheduleSave=useCallback(()=>{
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const p=pseudoRef.current;
      if(!p||p==="__admin")return;
      await ss(`predictions/${p}`,predsRef.current);
      setSaved("✓ Sauvegardé");
      setTimeout(()=>setSaved(""),2000);
    },800);
  },[]);

  const onChangePred=useCallback((type,id,field,val)=>{
    setPreds(prev=>({...prev,[type]:{...prev[type],[id]:{...prev[type]?.[id],[field]:val}}}));
    scheduleSave();
  },[scheduleSave]);

  const onChangeBonus=useCallback((field,val)=>{
    setPreds(prev=>({...prev,bonus:{...prev.bonus,[field]:val}}));
    scheduleSave();
  },[scheduleSave]);

  const handleJoin=async(name, pwd)=>{
    if(name==="__admin")return;
    const existingPwd = await sg(`passwords/${name}`, null);
    if(existingPwd){
      // Joueur existant → vérifier le mot de passe
      if(existingPwd !== pwd){
        alert("❌ Mot de passe incorrect pour ce pseudo.");
        return;
      }
    } else {
      // Vérifier si les inscriptions sont clôturées
      if(settings.registrationClosed){
        alert("🔒 Les inscriptions sont clôturées. Contactez l'administrateur.");
        return;
      }
      // Récupère la liste FRAÎCHE depuis Firebase (évite d'écraser les autres)
      const freshPlayers = await sg("players", {});
      const np = {...freshPlayers, [name]:{joinedAt:new Date().toISOString()}};
      setPlayers(np);
      await ss("players",np);
      await ss(`passwords/${name}`, pwd);
    }
    try{localStorage.setItem("wc26_my_pseudo",name);localStorage.setItem("wc26_my_pwd",pwd);}catch{}
    setPseudo(name);setPage("groups");
    // Demander permission notifications push
    setTimeout(()=>requestNotifPermission(name), 2000);
  };

  const handleAdmin=()=>{setIsAdmin(true);setPseudo("__admin");setPage("admin");};

  const saveResult=async(type,id,h,a)=>{
    const updated={...results,[type]:{...results[type],[id]:{h,a}}};
    setResults(updated);await ss("results",updated);
    // Snapshot du classement après chaque résultat
    try {
      const allPlayers = await sg("players", {});
      const board = await Promise.all(Object.keys(allPlayers).map(async pk => {
        const pd = await sg(`predictions/${pk}`, {grp:{},ko:{},bonus:{}});
        const score = calcScore(pd, updated, koMatchesRef.current, settingsRef.current.bonusResults);
        return {pseudo:pk, total:score.total, exact:score.exact, good:score.good};
      }));
      board.sort((a,b) => b.total - a.total);
      const snapshot = {ts: Date.now(), board};
      const hist = await sg("leaderboard_history", []);
      const newHist = [...(hist||[]), snapshot].slice(-30);
      await ss("leaderboard_history", newHist);
      setHistory(newHist);
    } catch(e) { console.log("history snap err",e); }
  };
  const deleteResult=async(type,id)=>{
    const updated={...results,[type]:{...results[type]}};delete updated[type][id];
    setResults(updated);await ss("results",updated);
  };
  const saveSettings=async(upd)=>{
    const ns={...settings,...upd};
    if(upd.bonusResults)ns.bonusResults={...settings.bonusResults,...upd.bonusResults};
    await ss("settings",ns);
    setSettings(ns);
  };
  const addKoMatch=async(round,h,a)=>{
    const prev=koMatches[round]||[];
    const id=`KO${round.substring(0,3).replace(/\s/g,"")}${prev.length+1}`;
    const updated={...koMatches,[round]:[...prev,{id,h,a}]};
    setKoMatches(updated);await ss("koMatches",updated);
  };
  const removeKoMatch=async(round,id)=>{
    const updated={...koMatches,[round]:(koMatches[round]||[]).filter(m=>m.id!==id)};
    setKoMatches(updated);await ss("koMatches",updated);
  };

  const loadLeaderboard=useCallback(async()=>{
    setLbLoading(true);
    // Toujours recharger la liste fraîche depuis Firebase
    const freshPlayers = await sg("players", {});
    setPlayers(freshPlayers);
    const board=await Promise.all(Object.keys(freshPlayers).map(async p=>{
      const pd=await sg(`predictions/${p}`,{grp:{},ko:{},bonus:{}});
      const score=calcScore(pd,resultsRef.current,koMatchesRef.current,settingsRef.current.bonusResults);
      return{pseudo:p,score,preds:pd};
    }));
    board.sort((a,b)=>{
      if(b.score.total!==a.score.total) return b.score.total-a.score.total;
      const aFound=a.score.exact+a.score.good;
      const bFound=b.score.exact+b.score.good;
      return bFound-aFound;
    });
    setLeaderboard(prev=>{ setPrevLeaderboard(prev); return board; });
    setLbLoading(false);
  },[]);

  useEffect(()=>{if(page==="leaderboard")loadLeaderboard();},[page]);

  // Détection score exact → confettis 🎉
  const seenExactsRef = useRef(new Set());
  useEffect(() => {
    if (!pseudo || pseudo === "__admin" || !preds) return;
    const newExacts = [];
    GM.forEach(m => {
      const r = results?.grp?.[m.id];
      const p = preds.grp?.[m.id];
      if (r && p && matchPts(p,r) === 2) {
        const key = "grp_" + m.id;
        if (!seenExactsRef.current.has(key)) newExacts.push(key);
      }
    });
    KO_ROUNDS.forEach(rd => (koMatches[rd]||[]).forEach(m => {
      const r = results?.ko?.[m.id];
      const p = preds.ko?.[m.id];
      if (r && p && matchPts(p,r) === 2) {
        const key = "ko_" + m.id;
        if (!seenExactsRef.current.has(key)) newExacts.push(key);
      }
    }));
    // Skip first render to avoid confetti on app load
    if (seenExactsRef.current.size === 0 && newExacts.length > 0) {
      newExacts.forEach(k => seenExactsRef.current.add(k));
      return;
    }
    if (newExacts.length > 0) {
      newExacts.forEach(k => seenExactsRef.current.add(k));
      launchConfetti();
      setTimeout(launchConfetti, 800);
    }
  }, [results, preds, koMatches, pseudo]);

  // Rappel match dans 1h sans pronostic → notification LOCALE (sur cet appareil uniquement)
  const remindedRef = useRef(new Set());
  useEffect(() => {
    if (!pseudo || pseudo === "__admin") return;
    const check = () => {
      const now = new Date();
      const in1h = new Date(now.getTime() + 60*60*1000);
      GM.forEach(m => {
        const ko = SCHEDULE[m.id];
        if (!ko) return;
        const koDate = new Date(ko);
        if (koDate < now || koDate > in1h) return;
        const p = preds.grp?.[m.id];
        if (p && p.h !== "" && p.h != null) return;
        const key = "rem_" + m.id;
        if (remindedRef.current.has(key)) return;
        remindedRef.current.add(key);
        // Notification LOCALE uniquement (pas de push à tous les autres !)
        try {
          if (typeof Notification !== "undefined" && Notification.permission === "granted") {
            new Notification("⏰ Andiamo CDM 2026", {
              body: `${m.h} vs ${m.a} dans moins d'1h ! N'oublie pas ton pronostic.`,
              tag: key
            });
          }
        } catch(e) { console.log("local notif err", e); }
      });
    };
    check();
    const i = setInterval(check, 5*60*1000);
    return () => clearInterval(i);
  }, [pseudo, preds]);

  const myScore=calcScore(preds,results,koMatches,settings.bonusResults);

  if(loading) return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:T.bg,color:T.muted,fontFamily:"Inter,sans-serif",fontSize:16}}>Chargement…</div>);
  if(page==="welcome") return <WelcomePage onJoin={handleJoin} onAdmin={handleAdmin}/>;

  const navTabs=isAdmin?[
    {id:"admin",icon:"📋",label:"Résultats"},
    {id:"admin_knockout",icon:"🏆",label:"Finale"},
    {id:"admin_bonus",icon:"⭐",label:"Bonus"},
    {id:"admin_classement",icon:"📊",label:"Classement"},
    {id:"admin_notifs",icon:"🔔",label:"Notifs"},
    {id:"admin_settings",icon:"⚙️",label:"Réglages"},
  ]:[
    {id:"groups",icon:"📋",label:"Matchs"},
    {id:"leaderboard",icon:"📊",label:"Classement"},
    {id:"knockout",icon:"🏆",label:"Finale"},
    {id:"bonus",icon:"⭐",label:"Bonus"},
    {id:"profile",icon:"👤",label:"Profil"},
    {id:"notifs",icon:"🔔",label:"Notifs",badge:unreadCount},
  ];

  return(
    <div style={{background:T.bg,minHeight:"100vh",color:T.text,fontFamily:"Inter,sans-serif",maxWidth:900,margin:"0 auto"}}>
      {/* Header simplifié en haut */}
      <div style={{background:T.card,borderBottom:`1px solid ${T.border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>⚽</span>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:T.gold,letterSpacing:1}}>ANDIAMO CDM 2026</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>            {saved&&<span style={{color:T.green,fontSize:13,fontWeight:500}}>{saved}</span>}
            {!isAdmin&&(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>{
                  try{localStorage.removeItem("wc26_my_pseudo");localStorage.removeItem("wc26_my_pwd");}catch{}
                  setPseudo("");setPage("welcome");
                }} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,padding:"4px 10px",color:T.muted,fontSize:11,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>
                  🚪 Déco
                </button>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:T.muted}}>{pseudo}</div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800,color:T.gold,lineHeight:1}}>{myScore.total} pts</div>
                </div>
              </div>
            )}
            {isAdmin&&(
              <button onClick={()=>{
                setIsAdmin(false);setPseudo("");setPage("welcome");
              }} style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,padding:"4px 10px",color:T.muted,fontSize:11,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>
                🚪 Déco admin
              </button>
            )}
          </div>
        </div>
      </div>

      {/* Bannière rappel si match dans 1h sans pronostic */}
      {!isAdmin && <ReminderBanner preds={preds} schedule={schedule}/>}

      {/* Contenu */}
      <div style={{padding:"0 16px 90px"}}>
        {/* Récap final si tournoi terminé */}
        {!isAdmin && page !== "welcome" && <FinalRecap results={results} koMatches={koMatches} leaderboard={leaderboard} history={history} settings={settings}/>}

        {page==="groups"&&(<>
          <div style={{paddingTop:20}}>
            <TodaySection preds={preds} schedule={schedule} results={results} koMatches={koMatches}/>
          </div>
          <GroupsPage preds={preds} results={results} activeGroup={activeGroup} setActiveGroup={setActiveGroup} onChangePred={onChangePred} schedule={schedule} scheduleLoading={scheduleLoading} liveData={liveData}/>
        </>)}
        {page==="bonus"&&<BonusPage preds={preds} settings={settings} onChangeBonus={onChangeBonus}/>}
        {page==="knockout"&&<KoPage preds={preds} results={results} koMatches={koMatches} settings={settings} activeRound={activeRound} setActiveRound={setActiveRound} onChangePred={onChangePred} schedule={schedule} liveData={liveData}/>}
        {page==="leaderboard"&&<LeaderboardPage leaderboard={leaderboard} prevLeaderboard={prevLeaderboard} loading={lbLoading} myPseudo={pseudo} onRefresh={loadLeaderboard} results={results} schedule={schedule} koMatches={koMatches} history={history}/>}
        {page==="profile"&&<ProfilePage pseudo={pseudo} preds={preds} results={results} koMatches={koMatches} settings={settings} leaderboard={leaderboard} history={history}/>}
        {page==="notifs"&&(
          <div style={{paddingTop:20}}>
            <PageTitle sub={`${notifs.length} message${notifs.length>1?"s":""} de l'administrateur`}>🔔 NOTIFICATIONS</PageTitle>
            {notifs.length===0?(
              <div style={{background:T.card,borderRadius:14,padding:40,textAlign:"center",border:`1px solid ${T.border}`}}>
                <div style={{fontSize:40,marginBottom:12}}>🔔</div>
                <div style={{color:T.muted,fontSize:14}}>Aucune notification pour le moment.</div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {notifs.map((n,i)=>{
                  const isNew=!lastSeenNotif||n.ts>lastSeenNotif;
                  return(
                    <div key={n.id} style={{background:isNew&&i===0?"linear-gradient(135deg,#0d1f38,#0e2b1a)":T.card,borderRadius:14,padding:"14px 18px",border:`1px solid ${isNew&&i===0?T.green+"66":T.border}`}}>
                      {isNew&&i===0&&<div style={{fontSize:11,color:T.green,fontWeight:700,marginBottom:6}}>🆕 NOUVEAU</div>}
                      <div style={{fontSize:14,color:T.text,lineHeight:1.6,marginBottom:6}}>{n.msg}</div>
                      <div style={{fontSize:11,color:T.muted}}>{new Date(n.ts).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
        {page==="admin"&&<AdminPage results={results} settings={settings} koMatches={koMatches} players={players} saveResult={saveResult} deleteResult={deleteResult} saveSettings={saveSettings} addKoMatch={addKoMatch} removeKoMatch={removeKoMatch} adminTab={adminTab} setAdminTab={setAdminTab} activeGroup={activeGroup} setActiveGroup={setActiveGroup} activeRound={activeRound} setActiveRound={setActiveRound} setResults={setResults} setPlayers={setPlayers} leaderboard={leaderboard} prevLeaderboard={prevLeaderboard} loadLeaderboard={loadLeaderboard}/>}
      </div>

      {/* Barre de navigation bas — style Instagram */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:900,background:T.card,borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100}}>
        {navTabs.map(t=>{
          const adminTabMap={"admin":"groups","admin_knockout":"knockout","admin_bonus":"bonus","admin_classement":"classement","admin_notifs":"notifs","admin_settings":"settings"};
          const active=isAdmin?(adminTabMap[t.id]===adminTab):page===t.id;
          return(
            <button key={t.id} onClick={()=>{
              if(isAdmin){setAdminTab(adminTabMap[t.id]);setPage("admin");}
              else{setPage(t.id);if(t.id==="notifs"&&notifs.length>0)setLastSeenNotif(notifs[0].ts);}
            }}
              style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,padding:"10px 4px 14px",border:"none",background:"transparent",cursor:"pointer",transition:"all 0.15s",position:"relative"}}>
              <div style={{position:"relative",display:"inline-block"}}>
                <span style={{fontSize:22,lineHeight:1,filter:active?"none":"grayscale(1) opacity(0.4)",transition:"all 0.15s"}}>{t.icon}</span>
                {t.badge>0&&<span style={{position:"absolute",top:-4,right:-6,background:T.red,color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Inter,sans-serif"}}>{t.badge>9?"9+":t.badge}</span>}
              </div>
              <span style={{fontSize:10,fontFamily:"Inter,sans-serif",fontWeight:active?700:400,color:active?T.gold:T.muted,transition:"all 0.15s"}}>{t.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:"50%",background:T.gold,position:"absolute",bottom:6}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
